<html>
<head>
    <title>India Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background: #f4f4f4;
        }

        h1 {
            background: #ff6b00;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .buttons {
            margin: 20px;
        }

        .buttons button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            cursor: pointer;
            background: #333;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .buttons button:hover {
            background: #ff6b00;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .image-box {
            width: 300px;
            margin: 10px;
            overflow: hidden;
            border-radius: 10px;
        }

        .image-box img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: 0.4s;
        }

        .image-box img:hover {
            transform: scale(1.1);
        }

        .hide {
            display: none;
        }

        @media(max-width: 768px){
            .image-box {
                width: 90%;
            }
        }
        
    </style>
</head>

<script>
function filterSelection(category) {
    let images = document.getElementsByClassName("image-box");

    if (category === "all") category = "";

    for (let i = 0; i < images.length; i++) {
        images[i].classList.add("hide");

        if (images[i].className.indexOf(category) > -1) {
            images[i].classList.remove("hide");
        }
    }
}
